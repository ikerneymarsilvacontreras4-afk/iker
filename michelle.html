<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelle ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
overflow:hidden;
background:linear-gradient(-45deg,#ff4d88,#ff7eb3,#ffb6c1,#ffd6e7);
background-size:400% 400%;
animation:fondo 15s ease infinite;
color:white;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 💌 INICIO */
#inicio{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.sobre{
font-size:180px;
cursor:pointer;
animation:latido 1.5s infinite;
}

@keyframes latido{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

#inicio h1{
font-size:4rem;
margin-top:15px;
}

/* 📖 LIBRO */
#libro{
display:none;
width:100%;
height:100vh;
position:relative;
perspective:3000px;
}

.pagina{
position:absolute;
width:100%;
height:100%;
padding:60px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);

transform-origin:left center;

opacity:0;
transform:rotateY(-90deg);
transition:1s;
}

.pagina.activa{
opacity:1;
transform:rotateY(0deg);
}

h2{
font-size:3rem;
margin-bottom:25px;
}

.texto{
max-width:900px;
font-size:1.4rem;
line-height:2;
min-height:300px;
white-space:pre-line;
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:bold;
background:white;
color:#ff4d88;
margin-top:20px;
}

/* 💖 corazones */
.corazon{
position:absolute;
pointer-events:none;
animation:subir 8s linear forwards;
}

@keyframes subir{
from{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
to{transform:translateY(-150px);opacity:0;}
}

.final{
font-size:7rem;
animation:latido 1s infinite;
}

/* 💥 PANTALLA FINAL */
#final{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#ff4d88,#000);
text-align:center;
animation:showFinal 1.5s ease;
}

@keyframes showFinal{
from{opacity:0;transform:scale(1.3);}
to{opacity:1;transform:scale(1);}
}

#final h1{
font-size:6.5rem;
text-shadow:0 0 40px #fff, 0 0 80px #ff4d88;
animation:beat 1s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

#final p{
font-size:1.5rem;
margin-top:20px;
}

</style>
</head>

<body>

<audio id="musica" loop>
<source src="Mon Laferte - Antes De Ti (Video Oficial).mp3" type="audio/mpeg">
</audio>

<!-- 💌 INICIO -->
<div id="inicio">
<div class="sobre" onclick="abrirLibro()">💌</div>
<h1>Para Michelle ❤️</h1>
<p>Haz clic en el sobre</p>
</div>

<!-- 📖 LIBRO -->
<div id="libro">

<div class="pagina activa">

."></div>

<div class="pagina">
<h2>💕 Nuestros momentos 💕</h2>

En estos 2 meses contigo hay momentos que se me quedaron grabados, no por lo que hicimos exactamente, sino por cómo me hiciste sentir en cada uno de ellos.

</div>

<div class="pagina">

<div class="texto" data-texto="Michelle,

Gracias por aparecer en mi vida y hacerla un poco más bonita sin siquiera intentarlo. Gracias por tu forma de ser, por tu risa, por tu mirada, por cada pequeño detalle que a veces ni tú notas, pero que a mí se me quedan grabados.

Gracias por los momentos que hemos compartido, desde los más simples hasta los que sin planearlo se volvieron especiales. Por las conversaciones, por las risas, por los silencios tranquilos que no incomodan, sino que acompañan.

<button onclick="siguiente()">Siguiente ➜</button>
</div>

<div class="pagina">
<div class="final">❤️</div>
<h2>Final del libro</h2>
<div class="texto" data-texto="Michelle,

Hay algo en ti que me desordena el corazón de la mejor manera posible.

Desde que llegaste a mi vida, todo se siente distinto. No porque el mundo haya cambiado, sino porque contigo aprendí a ver las cosas con otros ojos. Tu presencia tiene algo que me calma, que me ilumina, que me hace querer quedarme un poco más en cada momento.

<button onclick="final()">Terminar</button>
</div>

</div>

<!-- 💥 FINAL GIGANTE -->
<div id="final">
<h1>TE AMO MICHELLE ❤️</h1>
<p>Siempre tú, siempre nosotros</p>
</div>

<script>

let paginas=document.querySelectorAll(".pagina");
let actual=0;

/* 💌 ABRIR */
function abrirLibro(){

document.getElementById("musica").play();

document.getElementById("inicio").style.display="none";
document.getElementById("libro").style.display="block";

escribir(paginas[0].querySelector(".texto"));
explosion();
}

/* ✍️ ESCRITURA */
function escribir(el){

let texto=el.dataset.texto;
el.innerHTML="";
let i=0;

let intervalo=setInterval(()=>{

el.innerHTML+=texto.charAt(i);
i++;

if(i>=texto.length){
clearInterval(intervalo);
}

},20);

}

/* 📖 SIGUIENTE */
function siguiente(){

explosion();

paginas[actual].classList.remove("activa");

actual++;

if(actual<paginas.length){

paginas[actual].classList.add("activa");
escribir(paginas[actual].querySelector(".texto"));
}

}

/* 💥 FINAL */
function final(){

document.getElementById("libro").style.display="none";
document.getElementById("final").style.display="flex";

explosion();
}

/* 💖 EXPLOSIÓN */
function explosion(){

for(let i=0;i<30;i++){

let h=document.createElement("div");
h.className="corazon";
h.innerHTML="❤️";

h.style.left="50vw";
h.style.top="50vh";
h.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(h);

let x=(Math.random()-0.5)*1000;

h.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,-800px)`,opacity:0}
],{
duration:2000
});

setTimeout(()=>h.remove(),2000);
}

}

/* 💖 LLUVIA */
setInterval(()=>{

let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤️";
c.style.left=Math.random()*100+"vw";
c.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),8000);

},300);

</script>

</body>
</html>
